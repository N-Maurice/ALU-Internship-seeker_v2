name: alu_internship_seeker_ii
description: ALU Venture Connect - Connecting student ambition with startup opportunities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  intl: ^0.20.3
  shimmer: ^3.0.0
  image_picker: ^1.0.4
  url_launcher: ^6.2.1
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  google_sign_in: ^7.2.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/