name: alu_internship_seeker_ii
description: ALU Venture Connect - Connecting student ambition with startup opportunities.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  shared_preferences: ^2.2.2
  dio: ^5.3.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  flutter_secure_storage: ^9.0.0
  shimmer: ^3.0.0
  image_picker: ^1.0.4
  url_launcher: ^6.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/